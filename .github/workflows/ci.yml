name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Build
        run: go build -o wtd .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
