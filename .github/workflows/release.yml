name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "2.9.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build MCPB bundle
        run: sh scripts/build-mcpb.sh "${GITHUB_REF_NAME#v}"

      - name: Upload MCPB bundle to release
        run: gh release upload "$GITHUB_REF_NAME" what-the-discogs.mcpb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
